name: cd-pipeline

on:
  workflow_run:
    workflows: ['ci-pipeline']
    types: ['completed']

jobs:
  cd_pipeline:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: self-hosted
    steps:
      - name: Deploy
        working-directory: /root/go-deployment
        run: |
#          docker rm -f bookmark_service
#          docker compose pull --no-cache bookmark_service
#          docker compose up -d
#          docker system prune -f
          docker compose pull bookmark_service
          docker compose up -d --force-recreate bookmark_service
          docker image prune -f

      
